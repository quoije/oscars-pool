<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pool Oscars - Changer le mot de passe</title>
  <script src="./js/app_theme.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="./css/app.css" rel="stylesheet">
</head>
<body class="bg-light">
<button class="theme-toggle theme-toggle--floating" type="button" data-theme-toggle role="switch" aria-checked="false" aria-label="Basculer le mode sombre">
  <span class="theme-toggle-icon theme-toggle-icon-sun" aria-hidden="true">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="4"></circle>
      <path d="M12 2v2"></path>
      <path d="M12 20v2"></path>
      <path d="M4.93 4.93l1.41 1.41"></path>
      <path d="M17.66 17.66l1.41 1.41"></path>
      <path d="M2 12h2"></path>
      <path d="M20 12h2"></path>
      <path d="M4.93 19.07l1.41-1.41"></path>
      <path d="M17.66 6.34l1.41-1.41"></path>
    </svg>
  </span>
  <span class="theme-toggle-thumb" aria-hidden="true"></span>
  <span class="theme-toggle-icon theme-toggle-icon-moon" aria-hidden="true">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"></path>
    </svg>
  </span>
</button>

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4" style="max-width: 420px; width: 100%;">
    <div class="text-center mb-3">
      <img src="img/logo.png" class="logo-invert" style="width: 80%;" alt="Pool Oscars">
    </div>

    <div class="alert alert-warning" role="alert">
      Votre compte utilise un <strong>mot de passe temporaire</strong>. Veuillez définir un nouveau mot de passe pour continuer.
    </div>

    <div id="change-password-error" class="alert alert-danger d-none" role="alert"></div>

    <form id="change-password-form">
      <div class="mb-3">
        <label for="new-password" class="form-label">Nouveau mot de passe</label>
        <input type="password" class="form-control" id="new-password" minlength="8" required>
        <div class="form-text">Minimum 8 caractères.</div>
      </div>
      <div class="mb-3">
        <label for="confirm-password" class="form-label">Confirmer le mot de passe</label>
        <input type="password" class="form-control" id="confirm-password" minlength="8" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Enregistrer</button>
    </form>

    <button type="button" id="log-off" class="btn btn-outline-danger w-100 mt-3">Déconnexion</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="./js/app_change-password.js"></script>
</body>
</html>
