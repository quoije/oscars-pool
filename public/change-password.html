<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pool Oscars - Changer le mot de passe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="./css/app.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4" style="max-width: 420px; width: 100%;">
    <div class="text-center mb-3">
      <img src="img/logo.png" style="width: 80%;">
    </div>

    <div class="alert alert-warning" role="alert">
      Votre compte utilise un <strong>mot de passe temporaire</strong>. Veuillez définir un nouveau mot de passe pour continuer.
    </div>

    <div id="change-password-error" class="alert alert-danger d-none" role="alert"></div>

    <form id="change-password-form">
      <div class="mb-3">
        <label for="new-password" class="form-label">Nouveau mot de passe</label>
        <input type="password" class="form-control" id="new-password" minlength="8" required>
        <div class="form-text">Minimum 8 caractères.</div>
      </div>
      <div class="mb-3">
        <label for="confirm-password" class="form-label">Confirmer le mot de passe</label>
        <input type="password" class="form-control" id="confirm-password" minlength="8" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Enregistrer</button>
    </form>

    <button type="button" id="log-off" class="btn btn-outline-danger w-100 mt-3">Déconnexion</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="./js/app_change-password.js"></script>
</body>
</html>
