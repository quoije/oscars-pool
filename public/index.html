<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pool Oscars</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="./css/app.css" rel="stylesheet">
  <style>
    /* Ensure the body takes the full height */
    html, body {
      height: 100%;
    }

    /* Flexbox layout to make the content take available space */
    .container {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 100vh;
    }

  </style>
</head>
<body class="bg-light">

<div class="container">
  <div class="card p-4" style="max-width: 400px; margin: auto;">
    <div class="text-center mb-4">
      <img src="img/logo.png" style="width: 80%;">
    </div>
    <form id="login-form">
      <div class="mb-3">
        <label for="email" class="form-label">Courriel</label>
        <input type="email" class="form-control" id="email" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Mot de passe</label>
        <input type="password" class="form-control" id="password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Connexion</button>
    </form>
    <p class="mt-3 text-center">Pas de compte? <a href="/register.html">Enregistrez-vous</a></p>
  </div>

  <!-- Footer Section  -->
  <footer>
    
    <p id="footer-copy"><a id="copy" href="https://github.com/quoije/oscars-pool">quoije</a></p>
    <p id="footer-text"></p>
  </footer>
 
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="./js/app_index.js"></script>
<script src="./js/app_version.js"></script>

</body>
</html>
