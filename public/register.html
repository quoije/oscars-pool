<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pool Oscar 2025 - Enregistrement</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4" style="max-width: 400px;">
    <div class="text-center mb-4">
      <img src="img/logo.png" style="width: 80%";>
    </div>
    <form id="register-form">
      <div class="mb-3">
        <label for="name" class="form-label">Nom</label>
        <input type="text" class="form-control" id="name" required>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Courriel</label>
        <input type="email" class="form-control" id="email" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Mot de passe</label>
        <input type="password" class="form-control" id="password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Enregistrer</button>
    </form>
    <p class="mt-3 text-center">Déjà un compte? <a href="/">Connectez-vous</a></p>
  </div>
</div>

<!-- Modal for displaying registration response -->
<div class="modal fade" id="responseModal" tabindex="-1" aria-labelledby="responseModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="responseModalLabel">Statut de l’enregistrement</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" id="response-message">
        <!-- Response message will be inserted here -->
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button>
        <button type="button" class="btn btn-primary" id="redirect-login">Retourner à la page d'accueil</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Check if the user is already logged in by looking for auth_token in localStorage
  if (localStorage.getItem('auth_token')) {
    // If the token is found, redirect to /movies.html
    window.location.href = '/movies.html';
  }

  // Handle registration form submission
  document.getElementById('register-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    const res = await fetch('/api/users/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    });

    const responseMessageElement = document.getElementById('response-message');
    const modal = new bootstrap.Modal(document.getElementById('responseModal'));

    if (res.ok) {
      const data = await res.json();
      // Show success message in the modal
      responseMessageElement.textContent = data.message;
      
      // Show the modal
      modal.show();

      // Redirect to login after the modal is dismissed
      document.getElementById('redirect-login').addEventListener('click', function () {
        window.location.href = '/';
      });
    } else {
      const error = await res.json();
      // Show error message in the modal
      responseMessageElement.textContent = `Error: ${error.message}`;
      
      // Show the modal
      modal.show();
    }
  });
</script>

</body>
</html>
