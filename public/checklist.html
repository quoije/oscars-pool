<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pool Oscars 2025 - Checklist</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .navbar-custom {
      background-color: black;
      color: white;
    }
    .navbar-custom .navbar-brand,
    .navbar-custom .nav-link {
      color: white;
    }
    .navbar-custom .nav-link:hover {
      color: #ddd;
    }
    .movie-table {
      margin-top: 20px;
    }
    .ratio {
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>
<body class="bg-light">

<!-- Black banner with buttons and user info -->
<nav class="navbar navbar-expand-lg navbar-custom">
  <div class="container-fluid">
    <div class="d-flex align-items-center">
      <!-- Logo with max height and width control -->
      <a class="navbar-brand">
        <img src="img/logo_w.png" style="max-width: 180px; height: 70px; object-fit: contain;">
      </a>
      <a href="movies.html" class="btn btn-outline-light me-2">Films</a>
      <a href="checklist.html" class="btn btn-outline-light me-2">Checklist</a>
      <a href="user-stat.html" class="btn btn-outline-light">Statistiques</a>
    </div>
    <div class="d-flex">
      <span id="user-name" class="navbar-text me-3"></span>
      <button id="log-off" class="btn btn-danger">Déconnexion</button>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <h2>Checklist</h2>
  <div id="watched-ratio" class="ratio"></div>
  <h3 class="fs-6">Temps avant les Oscars (2 mars 2025) - <span id="time-left"></span></h3>
  <div class="progress my-3">
    <div id="progress-bar" class="progress-bar" role="progressbar" style="width: 0%; background-color: red;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
  </div>
  <!-- Table for movies -->
  <table class="table movie-table">
    <thead>
      <tr>
        <th scope="col">Titre</th>
        <th scope="col">Regardé</th>
        <th scope="col">Date du visionnage</th> <!-- New column for watched date -->
      </tr>
    </thead>
    <tbody id="movie-table-body">
      <!-- Movie rows will be inserted here -->
    </tbody>
  </table>
  <br><br>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  window.onload = async function () {
    const token = localStorage.getItem('auth_token');

    const targetDate = new Date('March 2, 2025');
    const currentDate = new Date();
    const timeDifference = targetDate - currentDate;
    const daysLeft = Math.floor(timeDifference / (1000 * 60 * 60 * 24));
    document.getElementById('time-left').textContent = `${daysLeft} jours`;

    if (token) {
      try {
        // Decode the token (using a library like jwt-decode or manually)
        const decoded = JSON.parse(atob(token.split('.')[1])); // Manually decoding JWT
        
        // Access the user's name from the decoded token
        const userName = decoded.name;

        // Update the user name in the navbar
        document.getElementById('user-name').textContent = userName;

        // Verify JWT Token expiration
        const currentTime = Math.floor(Date.now() / 1000); // Current time in seconds
        if (decoded.exp && decoded.exp < currentTime) {
          console.warn("Token is expired");
          localStorage.removeItem('auth_token'); // Remove the expired token
          window.location.href = '/'; // Redirect to the login page
        }
      } catch (error) {
        console.error("Error decoding token:", error);
        localStorage.removeItem('auth_token'); // Remove invalid token
        window.location.href = '/'; // Redirect to the login page
      }
    } else {
      // Handle case if no token is available
      window.location.href = '/';  // Redirect to the login page if no token
    }

    const res = await fetch('/api/movies', {
      method: 'GET',
      headers: { 'Authorization': `Bearer ${token}` }
    });

    if (!res.ok) {
      localStorage.removeItem('auth_token');
      window.location.href = '/';
      return;
    }

    const movies = await res.json();
    const watchedRes = await fetch('/api/movies/watchedMovies', {
      method: 'GET',
      headers: { 'Authorization': `Bearer ${token}` }
    });

    let watchedMovies = [];
    if (watchedRes.ok) {
      watchedMovies = await watchedRes.json();
    }

    const totalMoviesCount = movies.length;
    const watchedMoviesCount = watchedMovies.length;
    document.getElementById('watched-ratio').innerText = `Regardé: ${watchedMoviesCount} / ${totalMoviesCount} (${((watchedMoviesCount / totalMoviesCount) * 100).toFixed(1)}%)`;

    function updateProgressBar(watchedCount, totalCount) {
      const progressBar = document.getElementById('progress-bar');
      const percentage = (watchedCount / totalCount) * 100;
      progressBar.style.width = `${percentage}%`;

      if (percentage <= 50) {
        progressBar.style.backgroundColor = `rgb(${255}, ${Math.floor((percentage / 50) * 255)}, 0)`;
      } else {
        progressBar.style.backgroundColor = `rgb(${Math.floor(255 - ((percentage - 50) / 50) * 255)}, 255, 0)`;
      }

      progressBar.setAttribute('aria-valuenow', Math.round(percentage));
    }

    updateProgressBar(watchedMoviesCount, totalMoviesCount);

    const movieTableBody = document.getElementById('movie-table-body');
    movies.forEach(movie => {
      const watchedMovie = watchedMovies.find(wm => wm.imdb_id === movie.imdb_id);
      const watchedDate = watchedMovie ? new Date(watchedMovie.watchedDate).toLocaleString() : '';
      const movieRow = document.createElement('tr');
      movieRow.innerHTML = `
        <td>${movie.title}</td>
        <td>
          <input type="checkbox" class="form-check-input" id="movie-${movie.imdb_id}" ${watchedMovie ? 'checked' : ''} />
        </td>
        <td id="watched-date-${movie.imdb_id}">${watchedDate}</td>
      `;
      movieTableBody.appendChild(movieRow);

      const checkbox = document.getElementById(`movie-${movie.imdb_id}`);
      checkbox.addEventListener('change', async (event) => {
        const isChecked = event.target.checked;
        const watchedDateCell = document.getElementById(`watched-date-${movie.imdb_id}`);
        if (isChecked) {
          watchedDateCell.textContent = new Date().toLocaleString();
        } else {
          watchedDateCell.textContent = '';
        }

        await fetch('/api/movies/users/updateWatchedMovies', {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ imdb_id: movie.imdb_id, isChecked })
        });

        const updatedWatchedMoviesRes = await fetch('/api/movies/watchedMovies', {
          method: 'GET',
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (updatedWatchedMoviesRes.ok) {
          const updatedWatchedMovies = await updatedWatchedMoviesRes.json();
          const updatedWatchedCount = updatedWatchedMovies.length;
          document.getElementById('watched-ratio').innerText = `Regardé: ${updatedWatchedCount} / ${totalMoviesCount} (${((updatedWatchedCount / totalMoviesCount) * 100).toFixed(1)}%)`;
          updateProgressBar(updatedWatchedCount, totalMoviesCount);
        }
      });
    });

    document.getElementById('log-off').addEventListener('click', () => {
      localStorage.removeItem('auth_token');
      window.location.href = '/';
    });
  };
</script>
</body>
</html>
